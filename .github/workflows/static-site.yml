name: Generate Static Website

on:
  push:
    branches:
      - main
      - master
      - '*'
  pull_request:
    branches:
      - main
      - master

jobs:
  generate-static-site:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: json, mbstring
      
      - name: Generate static website
        run: php generate-static.php
      
      - name: Check if static-website changed
        id: check_changes
        run: |
          git add static-website/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push static website
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static-website/
          git commit -m "Auto-generate static website [skip ci]"
          git push
      
      - name: Upload static website as artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-website
          path: static-website/
          retention-days: 30
